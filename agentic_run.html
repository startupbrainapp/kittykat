<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KittyKat — Run Workflow</title>
<style>
  :root{--bg-canvas:#08090a;--bg-panel:#0f1011;--bg-surface:#191a1b;--bg-elevated:#28282c;--text-primary:#f7f8f8;--text-secondary:#d0d6e0;--text-tertiary:#8a8f98;--text-quaternary:#62666d;--brand:#5e6ad2;--brand-accent:#7170ff;--brand-hover:#828fff;--border-subtle:rgba(255,255,255,0.05);--border-standard:rgba(255,255,255,0.08);--surface-1:rgba(255,255,255,0.02);--surface-2:rgba(255,255,255,0.04);--surface-3:rgba(255,255,255,0.05);--green:#3fb950;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{font-family:'Inter var',Inter,-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;font-feature-settings:'cv01','ss03';-webkit-font-smoothing:antialiased;}
  body{background:var(--bg-canvas);color:var(--text-primary);height:100vh;overflow:hidden;font-size:15px;line-height:1.5;letter-spacing:-0.165px;display:flex;flex-direction:column;}
  button,input{font-family:inherit;}
  /* top bar */
  .topbar{height:52px;flex-shrink:0;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px;padding:0 16px;}
  .brand-dot{width:26px;height:26px;border-radius:7px;background:var(--bg-elevated);padding:3px;object-fit:contain;}
  .tb-name{font-size:14px;font-weight:590;color:var(--text-primary);letter-spacing:-0.16px;}
  .tb-sub{font-size:11px;color:var(--text-quaternary);}
  .tb-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .btn{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:510;letter-spacing:-0.13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;font-family:inherit;text-decoration:none;}
  .btn-ghost{background:var(--surface-1);border:1px solid var(--border-standard);color:var(--text-secondary);}
  .btn-ghost:hover{background:var(--surface-3);color:var(--text-primary);}
  .btn-primary{background:var(--brand);border:1px solid var(--brand);color:#fff;}
  .btn-primary:hover{background:var(--brand-hover);}
  .icon-btn{width:32px;height:32px;border-radius:7px;background:transparent;border:none;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .icon-btn:hover{background:var(--surface-3);color:var(--text-primary);}
  /* two-pane work area */
  .work{flex:1;display:flex;overflow:hidden;}
  .canvas{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  .canvas-head{flex-shrink:0;padding:16px 24px 12px;font-size:13px;color:var(--text-tertiary);font-weight:510;}
  .canvas-head b{color:var(--text-primary);}
  .canvas-body{flex:1;overflow-y:auto;padding:0 24px 28px;}
  .canvas-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-quaternary);text-align:center;}
  .ce-ic{width:56px;height:56px;border-radius:14px;background:var(--surface-1);border:1px solid var(--border-standard);display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);}
  .ce-t{font-size:13px;max-width:280px;line-height:1.5;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:760px;}
  .grid img{width:100%;border-radius:12px;border:1px solid var(--border-standard);display:block;}
  /* chat pane */
  .chatpane{width:400px;min-width:400px;border-left:1px solid var(--border-subtle);background:var(--bg-panel);display:flex;flex-direction:column;overflow:hidden;}
  .chat-head{flex-shrink:0;padding:14px 18px 10px;font-size:10px;font-weight:590;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-quaternary);}
  .msgs{flex:1;overflow-y:auto;padding:6px 18px 16px;display:flex;flex-direction:column;gap:12px;}
  .m{display:flex;gap:9px;}
  .m.u{justify-content:flex-end;}
  .ava{width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bubble{max-width:84%;padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.5;letter-spacing:-0.13px;}
  .bubble.a{background:var(--surface-2);color:var(--text-secondary);border-top-left-radius:4px;}
  .bubble.u{background:var(--brand);color:#fff;border-top-right-radius:4px;}
  .opts{padding-left:33px;display:flex;flex-direction:column;gap:8px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{padding:8px 14px;border-radius:9999px;border:1px solid var(--border-standard);background:var(--surface-1);color:var(--text-secondary);font-size:13px;font-weight:510;cursor:pointer;}
  .chip:hover{background:var(--surface-3);color:var(--text-primary);border-color:rgba(255,255,255,0.2);}
  .imgpick{display:flex;gap:8px;flex-wrap:wrap;}
  .imgopt{width:76px;height:76px;border-radius:9px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--surface-3);}
  .imgopt:hover{border-color:var(--brand-accent);}
  .imgopt img{width:100%;height:100%;object-fit:cover;display:block;}
  .saved{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:510;color:var(--green);background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.3);padding:6px 11px;border-radius:9999px;align-self:flex-start;margin-left:33px;}
  .typing{display:inline-flex;gap:4px;padding:11px 13px;background:var(--surface-2);border-radius:12px;border-top-left-radius:4px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-quaternary);animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
  /* composer */
  .composer{flex-shrink:0;border-top:1px solid var(--border-subtle);padding:12px 14px;}
  .composer-field{display:flex;align-items:center;gap:8px;background:var(--bg-surface);border:1px solid var(--border-standard);border-radius:12px;padding:6px 6px 6px 14px;}
  .composer-field:focus-within{border-color:var(--brand-accent);}
  .composer-field input{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-size:14px;padding:6px 0;}
  .composer-field input::placeholder{color:var(--text-quaternary);}
  .send{width:34px;height:34px;border-radius:9px;border:none;background:var(--brand);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .send:hover{background:var(--brand-hover);}
  .send:disabled{background:var(--surface-3);color:var(--text-quaternary);cursor:default;}
  .composer-hint{font-size:11px;color:var(--text-quaternary);text-align:center;padding:4px 0 2px;}
  @media (max-width:820px){
    .work{flex-direction:column;}
    .chatpane{width:100%;min-width:0;border-left:none;border-top:1px solid var(--border-subtle);max-height:55vh;}
    .canvas{max-height:45vh;}
  }
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border-standard);color:var(--text-primary);font-size:13px;font-weight:510;padding:9px 16px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:100;}
</style>
</head>
<body>
  <div class="topbar">
    <img class="brand-dot" src="bape-logo.png" alt="">
    <div><div class="tb-name" id="wfName">Workflow</div><div class="tb-sub">BAPE · powered by KittyKat</div></div>
    <div class="tb-right">
      <button class="btn btn-ghost" onclick="share()"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11 5a2 2 0 10-1.9-2.6L6.3 4.1a2 2 0 100 3.8l2.8 1.7A2 2 0 1010 8.2L7.2 6.5a2 2 0 000-1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>Share</button>
      <button class="icon-btn" title="Close" onclick="window.location='agentic_workflows.html'">&times;</button>
    </div>
  </div>

  <div class="work">
    <div class="canvas">
      <div class="canvas-head" id="canvasHead"></div>
      <div class="canvas-body" id="canvasBody"></div>
    </div>
    <div class="chatpane">
      <div class="chat-head">KittyKat</div>
      <div class="msgs" id="msgs"></div>
      <div class="composer" id="composer"></div>
    </div>
  </div>

  <div id="toast"></div>

<script>
  // The runner ONLY sees the visible questions — brand setup runs invisibly.
  var STEPS = [
    { type: 'text',   q: "What's the campaign name?" },
    { type: 'choice', q: 'Which platform is this for?', options: ['Instagram', 'TikTok', 'Facebook'] },
    { type: 'image',  q: 'Pick a shot style for the set.', options: ['images/2.jpg', 'images/4.jpg', 'images/9.jpg'] }
  ];
  var RESULT_IMGS = ['images/1.jpg', 'images/3.jpg', 'images/5.jpg', 'images/7.jpg'];

  var WF = new URLSearchParams(location.search).get('wf') || 'Workflow';
  document.getElementById('wfName').textContent = WF;
  document.title = 'KittyKat — Run ' + WF;

  var idx = 0, answers = [], done = false;
  var msgs = document.getElementById('msgs'), composer = document.getElementById('composer');
  var canvasHead = document.getElementById('canvasHead'), canvasBody = document.getElementById('canvasBody');

  function spark(){ return '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1.8l1.5 3.7 3.7 1.5-3.7 1.5L8 12.2 6.5 8.5 2.8 7l3.7-1.5z" fill="#fff"/></svg>'; }
  function aMsg(html){ return '<div class="m"><div class="ava">' + spark() + '</div><div class="bubble a">' + html + '</div></div>'; }
  function uMsg(text){ return '<div class="m u"><div class="bubble u">' + esc(text) + '</div></div>'; }
  function esc(s){ return (s || '').replace(/</g, '&lt;'); }

  function renderCanvas(){
    if (!done) {
      canvasHead.innerHTML = '';
      canvasBody.innerHTML = '<div class="canvas-empty"><div class="ce-ic"><svg width="24" height="24" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 11l3-2.5 2 1.5 3-3 3 3.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="6" cy="6" r="1.1" fill="currentColor"/></svg></div><div class="ce-t">Your on-brand set will appear here. Answer the few questions on the right.</div></div>';
    } else {
      canvasHead.innerHTML = '<b>' + RESULT_IMGS.length + '</b> assets produced · ' + esc(answers[0] || WF);
      canvasBody.innerHTML = '<div class="grid">' + RESULT_IMGS.map(function (s) { return '<img src="' + s + '">'; }).join('') + '</div>';
    }
  }

  function renderChat(){
    var html = aMsg("Hi! Let's make an on-brand asset with <b>" + esc(WF) + "</b>. Just a couple of quick questions.");
    for (var i = 0; i < answers.length; i++) html += aMsg(esc(STEPS[i].q)) + uMsg(answers[i]);
    if (!done && idx < STEPS.length) {
      var s = STEPS[idx];
      html += aMsg(esc(s.q));
      if (s.type === 'choice') html += '<div class="opts"><div class="chips">' + s.options.map(function (o) { return '<button class="chip" onclick="answer(\'' + o + '\')">' + o + '</button>'; }).join('') + '</div></div>';
      if (s.type === 'image') html += '<div class="opts"><div class="imgpick">' + s.options.map(function (o, i) { return '<div class="imgopt" onclick="answer(\'Style ' + (i + 1) + '\')"><img src="' + o + '"></div>'; }).join('') + '</div></div>';
    }
    msgs.innerHTML = html;
    msgs.scrollTop = msgs.scrollHeight;
    renderComposer();
  }

  function renderComposer(){
    if (done) { composer.innerHTML = '<div style="display:flex;gap:8px;"><button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="restart()">Make another</button><a class="btn btn-primary" style="flex:1;justify-content:center;" href="asset_manager.html">View in Shortlisted</a></div>'; return; }
    var s = STEPS[idx];
    if (s && s.type === 'text') {
      composer.innerHTML = '<div class="composer-field"><input id="ans" placeholder="Type your answer…" onkeydown="if(event.key===\'Enter\')answer(this.value)"><button class="send" onclick="answer(document.getElementById(\'ans\').value)"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h9M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>';
      var inp = document.getElementById('ans'); if (inp) inp.focus();
    } else {
      composer.innerHTML = '<div class="composer-field"><input placeholder="Tap an option above…" disabled><button class="send" disabled><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h9M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>';
    }
  }

  function answer(val){
    if (val == null || (typeof val === 'string' && !val.trim())) return;
    answers.push(typeof val === 'string' ? val.trim() : val);
    idx++;
    if (idx >= STEPS.length) generate();
    else renderChat();
  }

  function generate(){
    renderChat();
    msgs.insertAdjacentHTML('beforeend', '<div class="m"><div class="ava">' + spark() + '</div><div class="typing"><span></span><span></span><span></span></div></div>');
    composer.innerHTML = '<div class="composer-hint">Generating your on-brand set…</div>';
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(function () {
      done = true;
      renderCanvas();
      // append the closing message + saved chip
      var base = aMsg("Hi! Let's make an on-brand asset with <b>" + esc(WF) + "</b>. Just a couple of quick questions.");
      for (var i = 0; i < answers.length; i++) base += aMsg(esc(STEPS[i].q)) + uMsg(answers[i]);
      base += aMsg('Done — here’s your set for <b>' + esc(answers[0]) + '</b>, on the left.') +
        '<div class="saved"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M4 8.5l2.5 2.5L12 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Saved to Shortlisted</div>';
      msgs.innerHTML = base;
      msgs.scrollTop = msgs.scrollHeight;
      renderComposer();
    }, 1300);
  }

  function restart(){ idx = 0; answers = []; done = false; renderCanvas(); renderChat(); }
  function toast(m){ var t = document.getElementById('toast'); t.textContent = m; t.style.opacity = '1'; clearTimeout(t._t); t._t = setTimeout(function () { t.style.opacity = '0'; }, 2200); }
  function share(){
    var url = location.origin + location.pathname + '?wf=' + encodeURIComponent(WF) + '&shared=1';
    if (navigator.clipboard) navigator.clipboard.writeText(url);
    toast('Link copied — anyone can remake this asset');
  }

  renderCanvas();
  renderChat();
</script>
</body>
</html>
